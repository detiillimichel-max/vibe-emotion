<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OIO ONE - Oficial</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --accent: #00e5ff; --love: #ff0055; --glass: rgba(255, 255, 255, 0.1); }
        * { margin:0; padding:0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background:#000; height:100vh; width:100vw; overflow:hidden; position:fixed; font-family: sans-serif; color: #fff; }
        
        /* Camada 1: Fundo Dinâmico */
        #main-video-bg { position:absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; transition: opacity 0.5s; }
        .overlay { position:absolute; inset:0; background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent, rgba(0,0,0,0.8)); z-index: 2; }

        /* Camada 2: Identidade (Contatos) */
        #contatos-topo { position: absolute; top: 40px; left: 0; width: 100%; z-index: 500; display: flex; gap: 15px; padding: 10px 20px; overflow-x: auto; scrollbar-width: none; }
        .contato-item { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.6; transition: 0.4s; }
        .contato-item.active { opacity: 1; transform: scale(1.1); }
        .contato-photo { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--accent); background-size: cover; background-position: center; box-shadow: 0 0 15px var(--accent); }

        /* Camada 3: Interação (Botões) */
        .sidebar-actions { position: absolute; right: 20px; bottom: 120px; z-index: 600; display: flex; flex-direction: column; gap: 25px; align-items: center; }
        .action-btn { font-size: 30px; color: #fff; text-shadow: 0 2px 10px #000; cursor: pointer; }
        .action-btn.liked { color: var(--love); }

        /* Camada 4: Seções (Abas) */
        section { display:none; position:fixed; inset:0; z-index:1000; flex-direction:column; background: rgba(0,0,0,0.85); backdrop-filter: blur(20px); }
        section.active { display:flex; }

        /* Chat Estilizado */
        #chat-container { flex:1; overflow-y:auto; padding: 120px 20px 100px; display:flex; flex-direction:column; gap:12px; }
        .msg { padding:14px; border-radius:18px; max-width:80%; background: var(--glass); font-size: 14px; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: #0066ff; color: #fff; }

        .controles { display:flex; gap:15px; padding:20px; background:#111; align-items:center; }
        .controles input { flex:1; padding:12px 20px; border-radius:25px; border:none; background:#222; color:#fff; outline:none; }

        /* Botão Principal OIO */
        .btn-oio-main { position:absolute; right:25px; bottom:30px; width:65px; height:65px; border-radius:50%; background:var(--accent); color:#000; font-size:28px; border:none; z-index:1500; display:flex; align-items:center; justify-content:center; box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>

    <video id="main-video-bg" loop playsinline autoplay muted></video>
    <div class="overlay" onclick="togglePlay()"></div>

    <div id="contatos-topo">
        <div class="contato-item active" id="item-Michel" onclick="trocarUser('Michel', this)">
            <div class="contato-photo" style="background-image: url('https://github.com/detiillimichel.png')"></div>
            <span style="font-size:10px">Michel</span>
        </div>
        <div class="contato-item" id="item-Visitante" onclick="trocarUser('Visitante', this)">
            <div class="contato-photo" style="background-image: url('https://via.placeholder.com/150/555')"></div>
            <span style="font-size:10px">Convidado</span>
        </div>
    </div>

    <div class="sidebar-actions">
        <div onclick="curtirAtual()"><i id="heart-icon" class="fa-solid fa-heart action-btn"></i><div id="like-count" style="font-size:12px; text-align:center">0</div></div>
        <i class="fa-solid fa-circle-plus action-btn" onclick="document.getElementById('videoInput').click()" style="color:var(--accent)"></i>
    </div>

    <section id="chat-page">
        <div id="chat-container"></div>
        <div class="controles">
            <input id="msgInput" placeholder="Sua vibe...">
            <i class="fa-solid fa-paper-plane" style="color:var(--accent); font-size:22px" onclick="enviarMsg()"></i>
        </div>
        <button onclick="showPage('')" style="position:absolute; top:45px; right:25px; color:#fff; background:none; border:none; font-size:24px;">✕</button>
    </section>

    <button class="btn-oio-main" id="toggleChatBtn" onclick="showPage('chat-page')"><i class="fa-solid fa-comment"></i></button>

    <input type="file" id="videoInput" accept="video/*" style="display:none">

    <script>
        // 🔑 CONFIGURAÇÃO UNIFICADA
        const config = {
            apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        window.meuNome = localStorage.getItem('oio_user') || "Michel";
        let filaVideos = [];
        let indexVideo = 0;
        const player = document.getElementById('main-video-bg');

        // --- MOTOR DE VÍDEO (EMOTION) ---
        async function carregarVibes() {
            db.ref("vibes").limitToLast(20).on('value', snap => {
                filaVideos = [];
                snap.forEach(c => { filaVideos.push({id: c.key, ...c.val()}); });
                filaVideos.reverse();
                if(filaVideos.length > 0) tocarVideo(0);
            });
        }

        function tocarVideo(idx) {
            indexVideo = idx;
            const v = filaVideos[idx];
            if(player.src !== v.url) {
                player.src = v.url;
                player.muted = false;
                player.play().catch(()=> { player.muted = true; player.play(); });
            }
            document.getElementById('like-count').innerText = v.likes || 0;
            document.getElementById('heart-icon').classList.remove('liked');
        }

        player.onended = () => {
            indexVideo++;
            if(indexVideo >= filaVideos.length) indexVideo = 0;
            tocarVideo(indexVideo);
        };

        function togglePlay() { player.paused ? player.play() : player.pause(); }

        async function curtirAtual() {
            const v = filaVideos[indexVideo];
            await db.ref(`vibes/${v.id}/likes`).transaction(c => (c || 0) + 1);
            document.getElementById('heart-icon').classList.add('liked');
            if(navigator.vibrate) navigator.vibrate(50);
        }

        // --- MOTOR DE CHAT (MENSAGENS) ---
        function carregarChat() {
            db.ref("messages").limitToLast(30).on('value', snap => {
                const cont = document.getElementById('chat-container');
                cont.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    const d = document.createElement('div');
                    d.className = `msg ${m.autor === window.meuNome ? 'sent' : ''}`;
                    d.innerHTML = `<small style="display:block; font-size:10px; opacity:0.6">${m.autor}</small>${m.texto}`;
                    cont.appendChild(d);
                });
                cont.scrollTop = cont.scrollHeight;
            });
        }

        function enviarMsg() {
            const i = document.getElementById('msgInput');
            if(i.value.trim()) {
                db.ref("messages").push({ autor: window.meuNome, texto: i.value, time: Date.now() });
                i.value = "";
            }
        }

        // --- UTILITÁRIOS ---
        function trocarUser(nome, el) {
            window.meuNome = nome;
            localStorage.setItem('oio_user', nome);
            document.querySelectorAll('.contato-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function showPage(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }

        // UPLOAD SEGURO (CONVERTE PARA BASE64 PARA FUNCIONAR EM TODO LUGAR)
        document.getElementById('videoInput').onchange = (e) => {
            const file = e.target.files[0];
            if(file.size > 10 * 1024 * 1024) return alert("Máximo 10MB (30 seg)");
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                db.ref("vibes").push({
                    url: ev.target.result,
                    autor: window.meuNome,
                    likes: 0,
                    time: Date.now()
                });
                alert("Vibe postada!");
            };
            reader.readAsDataURL(file);
        };

        // Início
        carregarVibes();
        carregarChat();
    </script>
</body>
</html>
