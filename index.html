<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Emotion - OIO ONE</title>
    <style>
        :root { --bg: #000; --accent: #00f2ea; }
        body { margin: 0; background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        header { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; align-items: center; gap: 10px; z-index: 20; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .avatar { width: 35px; height: 35px; border-radius: 50%; border: 1.5px solid #fff; }
        .user-info { font-size: 14px; font-weight: 600; text-shadow: 1px 1px 3px #000; }
        #feed-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        video { width: 100%; height: 100vh; object-fit: cover; background: #000; }
        .btn-postar { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #ffffff; color: #000000; padding: 12px 28px; border-radius: 30px; font-weight: 800; border: none; box-shadow: 0 0 15px rgba(255,255,255,0.4); z-index: 100; font-size: 13px; text-transform: uppercase; cursor: pointer;}
        .sidebar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; align-items: center; gap: 25px; z-index: 30; }
        .action-item { text-align: center; cursor: pointer;}
        .icon-heart { font-size: 35px; filter: drop-shadow(0 0 5px #ff69b4); color: #ff69b4;}
        .count { font-size: 12px; font-weight: bold; margin-top: 5px; text-shadow: 1px 1px 3px #000; }
        .btn-back { width: 48px; height: 48px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 1px solid rgba(255,255,255,0.4); }
    </style>
</head>
<body>

    <header>
        <img src="https://github.com/detiillimichel.png" id="user-avatar" class="avatar">
        <div class="user-info" id="user-display">Michel • Agora</div>
    </header>

    <main id="feed-container">
        <video id="main-video" playsinline preload="auto"></video>
        <div class="sidebar">
            <div class="action-item" id="btn-like">
                <span class="icon-heart">💖</span>
                <div class="count" id="count-likes">0</div>
            </div>
            <div class="action-item" onclick="location.href='https://vibe-mensagens.vercel.app/'">
                <div class="btn-back">↩️</div>
                <div class="count">Chat</div>
            </div>
        </div>
    </main>

    <button class="btn-postar" onclick="document.getElementById('file-up').click()">🎬 POSTAR VIBE</button>
    <input type="file" id="file-up" style="display:none" accept="video/*">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script type="module">
        import { App } from './app.js';
        import { Uploader } from './upload.js';
        
        const firebaseConfig = {
            apiKey: "AIzaSyAkJlFLnzPdwJUbn-J5Qk5DSlKmBl4ZYMZw",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let filaVideos = [];
        let indexAtual = 0;
        const player = document.getElementById('main-video');

        async function init() {
            const oioData = await App.inicializar(db);
            filaVideos = oioData.vibes;

            if(filaVideos && filaVideos.length > 0) {
                tocarVideo(0);
            }
        }

        function tocarVideo(index) {
            if (index >= filaVideos.length) index = 0; // Volta ao início
            indexAtual = index;
            const vibe = filaVideos[indexAtual];

            player.src = vibe.url;
            player.play();

            // Atualiza Interface com dados de quem postou
            document.getElementById('user-display').innerText = `${vibe.autor || 'Usuário'} • Agora`;
            document.getElementById('count-likes').innerText = vibe.likes || 0;
        }

        // 🔄 FLUXO AUTOMÁTICO (O CORAÇÃO DO PROJETO)
        player.onended = () => {
            tocarVideo(indexAtual + 1);
        };

        // Pause/Play ao tocar
        player.onclick = () => player.paused ? player.play() : player.pause();

        // Curtida Transacional (Econômica)
        document.getElementById('btn-like').onclick = async () => {
            const id = filaVideos[indexAtual].id;
            const likeRef = db.ref(`vibes/${id}/likes`);
            await likeRef.transaction(c => (c || 0) + 1);
            document.getElementById('count-likes').innerText = parseInt(document.getElementById('count-likes').innerText) + 1;
        };

        document.getElementById('file-up').onchange = (e) => Uploader.enviar(db, e.target.files[0]);

        init();
    </script>
</body>
</html>
