<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Emotion - OIO ONE</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>

    <header>
        <span>✨ OIO ONE</span>
        <button id="btn-chat" class="btn-icon">💬</button>
    </header>

    <main id="video-feed">
        <div class="card" style="text-align:center; padding:40px;">
            <p style="color:var(--text-dim)">Iniciando conexão segura...</p>
        </div>
    </main>

    <div class="input-area">
        <button class="btn-icon" onclick="document.getElementById('file-upload').click()">➕</button>
        <input type="text" placeholder="Compartilhe uma memória..." readonly onclick="document.getElementById('file-upload').click()">
        <button id="btn-update" class="btn-primary" style="padding: 8px 15px; font-size: 10px;">🔄 ATUALIZAR</button>
    </div>

    <input type="file" id="file-upload" accept="video/*" style="display:none">

    <script type="module">
        import { App } from './app.js';
        import { Uploader } from './upload.js';
        import { Cache } from './cache.js';

        // 🔑 Configuração Firebase (Suas Chaves Michel)
        const firebaseConfig = {
            apiKey: "AIzaSyAkJlFLnzPdwJUbn-J5Qk5DSlKmBl4ZYMZw",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 🚀 Inicialização do App
        const feedContainer = document.getElementById('video-feed');
        
        async function rodarApp() {
            const vibes = await App.inicializar(db);
            feedContainer.innerHTML = ''; // Limpa o "Carregando"

            if (vibes.length === 0) {
                feedContainer.innerHTML = '<div class="card"><p>Nenhuma memória encontrada.</p></div>';
                return;
            }

            vibes.forEach(v => {
                const post = document.createElement('div');
                post.className = 'card vibe-post';
                post.innerHTML = `
                    <div style="padding:0 0 10px 0; font-size:12px; color:var(--accent)">@${v.autor}</div>
                    <div class="preview-container" style="text-align:center;">
                        <button class="btn-primary" onclick="window.carregarVideo(this, '${v.url}')">▶️ ASSISTIR VIBE</button>
                    </div>
                `;
                feedContainer.appendChild(post);
            });
        }

        // Funções de Interface
        document.getElementById('btn-chat').onclick = App.navegarParaChat;
        document.getElementById('btn-update').onclick = () => {
            localStorage.removeItem("vibe_feed_cache");
            location.reload();
        };

        // Escuta o Upload (Regra: Máx 800KB)
        document.getElementById('file-upload').onchange = (e) => {
            const user = localStorage.getItem("vibe_user") || "Michel";
            Uploader.enviar(db, e.target.files[0], user);
        };

        // Função Global para Carregamento sob Clique (Regra 7)
        window.carregarVideo = (btn, url) => {
            btn.parentElement.innerHTML = `<video src="${url}" controls autoplay style="width:100%; border-radius:12px;"></video>`;
        };

        rodarApp();
    </script>
</body>
</html>
