<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="https://github.com/detiillimichel.png" class="avatar">
        <div class="user-info">Michel • Agora</div>
    </header>

    <main id="feed-container">
        <video id="main-video" autoplay loop muted playsinline></video>
        
        <div class="sidebar">
            <div class="action-item"><span class="icon-vibe">💖</span><div class="count">0</div></div>
            <div class="action-item" onclick="location.href='https://vibe-mensagens.vercel.app/'">
                <div class="btn-back-chat">💬</div>
                <div class="count">Chat</div>
            </div>
        </div>
    </main>

    <button class="btn-postar" onclick="document.getElementById('file-up').click()">
        🎬 POSTAR VIBE
    </button>

    <input type="file" id="file-up" style="display:none" accept="video/*">

    <script type="module">
        import { App } from './app.js';
        import { Uploader } from './upload.js';
        
        // Configuração direta para o celular
        const firebaseConfig = {
            apiKey: "AIzaSyAkJlFLnzPdwJUbn-J5Qk5DSlKmBl4ZYMZw",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function init() {
            const vibes = await App.inicializar(db); 
            if(vibes && vibes[0]) {
                document.getElementById('main-video').src = vibes[0].url;
            }
        }

        document.getElementById('file-up').onchange = (e) => Uploader.enviar(db, e.target.files[0], "Michel");
        init();
    </script>
</body>
</html>
