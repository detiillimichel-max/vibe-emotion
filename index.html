<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Emotion - Conexão Real</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #topo-oio { position: fixed; top: 0; width: 100%; z-index: 100; padding: 15px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
        #user-info { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #00f2ea; }
        #user-photo { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #00f2ea; object-fit: cover; }
        
        #feed { height: 100vh; overflow-y: scroll; snap-type: y mandatory; scroll-behavior: smooth; }
        .vibe-slide { height: 100vh; width: 100vw; snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #111; }
        video { width: 100%; height: 100%; object-fit: contain; }

        .acoes { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .btn-n { background: none; border: none; font-size: 32px; filter: drop-shadow(0 0 5px #000); cursor: pointer; }
        .label-v { font-size: 12px; font-weight: bold; margin-top: -10px; }

        #btn-postar { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 12px 25px; border-radius: 30px; font-weight: bold; border: none; z-index: 100; box-shadow: 0 0 15px rgba(0,242,234,0.4); }
    </style>
</head>
<body>

    <header id="topo-oio">
        <div id="user-info">
            <img id="user-photo" src="https://via.placeholder.com/30" alt="👤">
            <span id="user-name">Michel • 18:58</span>
        </div>
        <div style="font-size: 18px; cursor: pointer;" onclick="window.location.href='https://vibe-mensagens.vercel.app/'">💬</div>
    </header>

    <div id="feed" onscroll="controlarVideos()">
        </div>

    <button id="btn-postar" onclick="document.getElementById('input-v').click()">🎬 POSTAR VIBE</button>
    <input type="file" id="input-v" accept="video/*" style="display:none" onchange="subirVibe(event)">

    <script>
        // 🚀 GATILHO DE FOCO (Ponto 2: Auto-Pausar)
        function controlarVideos() {
            const slides = document.querySelectorAll('video');
            slides.forEach(vid => {
                const rect = vid.getBoundingClientRect();
                if (rect.top >= 0 && rect.bottom <= window.innerHeight) {
                    if (vid.paused) vid.play();
                } else {
                    vid.pause();
                }
            });
        }

        // 🛡️ ENGENHARIA DE FILA (O que o 1 posta, o 2 vê)
        // Nota: Para funcionar real, você precisa colar suas chaves do Firebase aqui
        function subirVibe(event) {
            const file = event.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            adicionarAoFeed(url, "Você", true);
            
            // LÓGICA DE LIMPEZA (Gatilho de 20 para 5)
            const totalVibes = document.querySelectorAll('.vibe-slide').length;
            if(totalVibes > 20) {
                document.querySelector('.vibe-slide').remove(); // Apaga o rastro mais antigo
                console.log("OIO Protocol: Limpando rastro antigo para manter leveza.");
            }
        }

        function adicionarAoFeed(url, autor, noTopo) {
            const feed = document.getElementById('feed');
            const section = document.createElement('div');
            section.className = 'vibe-slide';
            section.innerHTML = `
                <video src="${url}" loop playsinline></video>
                <div class="acoes">
                    <button class="btn-n" onclick="this.innerText = (this.innerText == '❤️' ? '💖' : '❤️')">❤️</button>
                    <div class="label-v">0</div>
                    <button class="btn-n">💬</button>
                    <div class="label-v">0</div>
                </div>
                <div style="position:absolute; bottom:40px; left:20px; font-size:12px; text-shadow:1px 1px 2px #000;">@${autor}</div>
            `;
            
            if(noTopo) feed.prepend(section); else feed.appendChild(section);
            controlarVideos();
        }

        // Simulação inicial de vídeos na rede (Usuário 2 e 3)
        // Quando você conectar o Firebase, essa parte será automática
        iniciarRelogio();
        function iniciarRelogio() {
            const h = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            document.getElementById("user-name").innerText = "Michel • " + h;
        }
    </script>
</body>
</html>
