<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Emotion - OIO ONE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>

    <header>
        <span style="font-weight:800; color:var(--accent)">✨ OIO ONE</span>
        <button onclick="localStorage.removeItem('vibe_cache'); location.reload();" style="padding:5px 10px; font-size:12px">🔄 ATUALIZAR</button>
    </header>

    <main id="feed-container"></main>

    <div class="input-area">
        <input type="text" placeholder="Postar vibe..." readonly onclick="document.getElementById('file-up').click()">
        <button id="btn-chat-link">💬</button>
    </div>

    <input type="file" id="file-up" style="display:none" accept="video/*">

    <script type="module">
        import { App } from './app.js';
        import { Uploader } from './upload.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAkJlFLnzPdwJUbn-J5Qk5DSlKmBl4ZYMZw",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function start() {
            const vibes = await App.inicializar(db);
            const container = document.getElementById('feed-container');
            
            vibes.forEach(v => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="color:var(--accent); font-size:12px; margin-bottom:10px">@${v.autor}</div>
                    <div style="text-align:center">
                        <button onclick="this.parentElement.innerHTML='<video src=\'${v.url}\' controls autoplay style=\'width:100%; border-radius:12px\'></video>'">▶️ ASSISTIR</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('btn-chat-link').onclick = App.navegarParaChat;
        document.getElementById('file-up').onchange = (e) => Uploader.enviar(db, e.target.files[0], "Michel");

        start();
    </script>
</body>
</html>
