<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OIO ONE - Vibe</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>

    <header>
        <span class="logo">✨ OIO ONE</span>
        <button id="refresh-btn" class="btn-refresh">🔄 ATUALIZAR</button>
    </header>

    <main id="feed"></main>

    <div class="input-area">
        <div class="input-pill" onclick="document.getElementById('file-up').click()">
            <span>Postar vibe...</span>
        </div>
        <button id="btn-chat" class="btn-chat-icon">💬</button>
    </div>

    <input type="file" id="file-up" style="display:none" accept="video/*">

    <script type="module">
        import { App } from './app.js';
        import { Uploader } from './upload.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAkJlFLnzPdwJUbn-J5Qk5DSlKmBl4ZYMZw",
            databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Inicializar App
        App.renderizar(db, document.getElementById('feed'));

        // Eventos
        document.getElementById('btn-chat').onclick = () => window.location.href = 'https://vibe-mensagens.vercel.app/';
        document.getElementById('refresh-btn').onclick = () => { localStorage.removeItem('vibe_cache'); location.reload(); };
        document.getElementById('file-up').onchange = (e) => Uploader.enviar(db, e.target.files[0], "Michel");
    </script>
</body>
</html>
